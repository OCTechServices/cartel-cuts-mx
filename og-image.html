<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #060606; }
  .og {
    width: 1200px; height: 630px;
    background: radial-gradient(120% 90% at 50% 18%, #1a1a1a 0%, #0c0c0c 45%, #050505 100%);
    color: #f4f2ee;
    font-family: "Hanken Grotesk", "Helvetica Neue", Helvetica, Arial, sans-serif;
    position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .og::after {
    content: ""; position: absolute; inset: 0;
    box-shadow: inset 0 0 200px 40px rgba(0,0,0,0.85);
    pointer-events: none;
  }
  .frame { position: absolute; inset: 36px; border: 1px solid rgba(189,188,183,0.22); pointer-events: none; }
  .corner { position: absolute; width: 14px; height: 14px; border: 1px solid rgba(189,188,183,0.6); }
  .corner.tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
  .corner.tr { top: 30px; right: 30px; border-left: none; border-bottom: none; }
  .corner.bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
  .corner.br { bottom: 30px; right: 30px; border-left: none; border-top: none; }
  .eyebrow {
    font-size: 16px; font-weight: 500; letter-spacing: 0.62em;
    text-transform: uppercase; color: #bdbcb7;
    margin-bottom: 40px; text-indent: 0.62em;
  }
  .logo-img { width: 320px; height: auto; margin-bottom: 28px;  }
  .rule { width: 64px; height: 1px; background: #bdbcb7; margin: 10px 0 26px; }
  .tag {
    font-size: 19px; font-weight: 400; letter-spacing: 0.46em;
    text-transform: uppercase; color: #9a958c; text-indent: 0.46em;
  }
</style>
</head>
